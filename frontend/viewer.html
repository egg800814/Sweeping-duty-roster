<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MDI掃地分配確認系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../assets/index.css">
</head>

<body class="portal-b">
  <div class="app-container">
    <header>
      <h1>掃地分配確認</h1>
    </header>

    <div id="loading">資料讀取中...</div>

    <div id="no-data" class="hidden">
      <h2>今日打掃區域尚未安排</h2>
    </div>

    <div id="container"></div>
  </div>

  <script>
    let API_URL = "";
    let lastDataString = "";

    async function initAndFetchData() {
      try {
        // 先從 data.json 取得 GAS_API_URL
        const dataRes = await fetch('../data/data.json?v=' + Date.now(), { cache: 'no-store' });
        const localData = await dataRes.json();
        const GAS_DEFAULT_URL = localData.gasApiUrl || 'YOUR_GAS_API_URL_HERE';
        
        // 如果有本地儲存的自訂 URL，優先使用
        API_URL = localStorage.getItem('gas_api_url') || GAS_DEFAULT_URL;

        if (!API_URL || API_URL === 'YOUR_GAS_API_URL_HERE') {
          document.getElementById('loading').innerText = "未設定有效的 API URL";
          return;
        }

        await fetchData();
      } catch (error) {
        console.error("初始化 URL 失敗", error);
        document.getElementById('loading').innerText = "初始化連線失敗，請檢查 API 設置";
      }
    }
    
    async function fetchData() {
      try {
        const response = await fetch(API_URL);
        const data = await response.json();
        
        // 將新抓到的陣列資料轉換成純文字字串
        const newDataString = JSON.stringify(data);
        
        // 【關鍵比對】如果新資料跟舊資料一模一樣，就什麼都不做，直接跳出
        if (newDataString === lastDataString) {
          // console.log("資料無更動，維持原畫面"); // 如果你想在開發者工具偷看，可以把這行註解打開
          return; 
        }

        // 如果執行到這裡，代表資料有變更！
        // 1. 把新的資料狀態存起來
        lastDataString = newDataString;
        
        // 2. 重新渲染畫面
        renderData(data);
        
      } catch (error) {
        console.error("載入失敗", error);
        document.getElementById('loading').innerText = "連線失敗，請檢查網路或 API 設置";
      }
    }

    function renderData(data) {
      document.getElementById('loading').classList.add('hidden');
      const container = document.getElementById('container');
      const noData = document.getElementById('no-data');

      const assignments = Array.isArray(data) ? data : data.assignments || [];

      if (!assignments || assignments.length === 0) {
        container.innerHTML = "";
        noData.classList.remove('hidden');
        return;
      }

      noData.classList.add('hidden');
      container.innerHTML = "";

      assignments.forEach(item => {
        const personsStr = item.staffNames !== undefined ? item.staffNames : (item.persons || '');
        const personsArr = personsStr.split(/[,，、]\s*/).map(p => p.trim()).filter(Boolean);
        const statuses = [item.status1, item.status2, item.status3, item.status4];
        const genders = item.genders || [item.gender1 || '', item.gender2 || '', item.gender3 || '', item.gender4 || ''];
        
        // 判斷是否為無人打掃
        const isUnassigned = personsArr.length === 0 || personsArr.includes('無人打掃');

        const card = document.createElement('div');
        card.className = isUnassigned ? "card card-unassigned" : "card";

        let cardBodyHtml = '';
        if (isUnassigned) {
          cardBodyHtml = `
            <div class="unassigned-msg">
              ⛱️ 此區域今日無需清潔
            </div>
          `;
        } else {
          personsArr.forEach((person, index) => {
            const isConfirmed = statuses[index] === "已確認";
            const gender = genders[index];
            const genderIcon = gender === 'male' ? '♂ ' : gender === 'female' ? '♀ ' : '';

            let btnClass = "btn";
            if (isConfirmed) {
              btnClass += " btn-success";
            } else if (gender === 'male') {
              btnClass += " btn-male";
            } else if (gender === 'female') {
              btnClass += " btn-female";
            } else {
              btnClass += " btn-confirm";
            }

            const btnText = isConfirmed ? `✓ ${genderIcon}${person} - 已確認` : `${genderIcon}${person}`;

            cardBodyHtml += `
              <button 
                id="btn-${item.areaCode}-${index}"
                onclick="confirmTask('${item.areaCode}', ${index})" 
                class="${btnClass}" 
                ${isConfirmed ? "disabled" : ""}>
                  ${btnText}
              </button>
            `;
          });
        }

        card.innerHTML = `
          <div class="card-header">
            <span class="area-badge">區域 ${item.areaCode}</span>
            ${isUnassigned ? '<span class="status-tag tag-unassigned">💤 今日免掃</span>' : ''}
            <div class="area-name">${item.areaName}</div>
          </div>
          <div class="card-body">
            ${cardBodyHtml}
          </div>
        `;
        container.appendChild(card);
      });
    }

    async function confirmTask(areaCode, personIndex) {
      const btn = document.getElementById(`btn-${areaCode}-${personIndex}`);
      const personName = btn.innerText.split(' - ')[0];
      const originalText = btn.innerText;

      btn.innerText = "傳送中...";
      btn.className = "btn btn-loading";
      btn.disabled = true;

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ areaCode: areaCode, personIndex: personIndex })
        });

        const result = await response.json();

        if (result.success) {
          btn.innerText = `✓ ${personName} - 已確認`;
          btn.className = "btn btn-success";
        } else {
          throw new Error();
        }
      } catch (error) {
        alert("傳送失敗，請稍後再試！");
        btn.innerText = originalText;
        btn.className = "btn btn-confirm";
        btn.disabled = false;
      }
    }

    initAndFetchData();
    setInterval(fetchData, 15000);
  </script>
</body>

</html>
