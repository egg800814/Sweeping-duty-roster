<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDI 掃地排班系統 - 入口門戶</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d28;
            --accent: #6c63ff;
            --accent-hover: #7f78ff;
            --accent-glow: rgba(108, 99, 255, 0.4);
            --text-primary: #e8eaf0;
            --text-secondary: #8b8fa8;
            --radius-lg: 24px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(108, 99, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(244, 114, 182, 0.05) 0%, transparent 40%);
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .portal-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 900px;
            width: 90%;
            animation: fadeInUp 0.8s ease 0.2s both;
        }

        .portal-card {
            background: rgba(34, 37, 54, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-lg);
            padding: 50px 40px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .portal-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, var(--accent-glow) 0%, transparent 70%);
            opacity: 0;
            transition: var(--transition);
            z-index: 0;
        }

        .portal-card:hover {
            transform: translateY(-10px);
            border-color: rgba(108, 99, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .portal-card:hover::before {
            opacity: 1;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: var(--bg-secondary);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
            transition: var(--transition);
        }

        .portal-card:hover .icon-box {
            background: var(--accent);
            transform: scale(1.1) rotate(5deg);
        }

        .portal-card h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .portal-card p {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 700;
            opacity: 0.8;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .portal-grid {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <p>MDI CLEANING MANAGEMENT</p>
        <h1>排班系統入口</h1>
    </header>

    <div class="portal-grid">        
        <!-- 一般打掃人員入口 -->
        <a href="confirm.html" class="portal-card">
            <div class="icon-box">🧹</div>
            <h2>一般打掃人員</h2>
            <p>查看今日負責區域<br>並完成線上掃地確認</p>
        </a>

        <!-- 責任者入口 -->
        <a href="掃地排班系統_全功能單檔版.html" class="portal-card">
            <span class="badge">ADMIN</span>
            <div class="icon-box">🛠️</div>
            <h2>今週の朝掃除責任者</h2>
            <p>管理打掃區域、安排人員排班<br>以及系統進階設定</p>
        </a>
    </div>

</body>
</html>
