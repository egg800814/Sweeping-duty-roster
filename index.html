<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDI 掃地排班系統 - 入口門戶</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/index.css">
</head>

<body class="portal-a">

    <header>
        <p>MDI CLEANING MANAGEMENT</p>
        <h1>排班系統入口</h1>
    </header>

    <div class="portal-grid">
        <!-- 一般打掃人員入口 -->
        <a href="frontend/viewer.html" class="portal-card">
            <div class="icon-box">🧹</div>
            <h2>一般打掃人員</h2>
            <p>查看今日負責區域<br>並完成線上掃地確認</p>
        </a>

        <!-- 責任者入口 -->
        <a href="frontend/setup.html" class="portal-card">
            <span class="badge">ADMIN</span>
            <div class="icon-box">🛠️</div>
            <h2>今週の朝掃除責任者</h2>
            <p>管理打掃區域、安排人員排班<br>以及系統進階設定</p>
            <p id="plannerInfo"
                style="margin-top:16px;font-size:0.85rem;color:#a78bfa;font-weight:600;position:relative;z-index:1;">
            </p>
        </a>
    </div>

    <script>
        (async () => {
            try {
                // 先從 data.json 取得 GAS_API_URL
                const dataRes = await fetch('../data/data.json?v=' + Date.now(), { cache: 'no-store' });
                const localData = await dataRes.json();
                const GAS_DEFAULT_URL = localData.gasApiUrl || 'YOUR_GAS_API_URL_HERE';

                // 如果有本地儲存的自訂 URL，優先使用
                const GAS_URL = localStorage.getItem('gas_api_url') || GAS_DEFAULT_URL;

                if (!GAS_URL || GAS_URL === 'YOUR_GAS_API_URL_HERE') return;

                const res = await fetch(GAS_URL);
                const data = await res.json();

                // 支援物件格式 result.todayPlanner 或 陣列格式 data[0].todayPlanner
                const planner = data.todayPlanner || (Array.isArray(data) && data.length > 0 ? data[0].todayPlanner : null);

                if (planner) {
                    document.getElementById('plannerInfo').textContent = '📋 今日責任者：' + planner;
                }
            } catch (e) {
                console.warn('無法讀取今日責任者:', e);
            }
        })();
    </script>

</body>

</html>
